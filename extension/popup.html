<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>豆瓣阅读备份工具</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      padding: 12px;
      background:
        radial-gradient(circle at top left, rgba(242, 192, 131, 0.55), transparent 30%),
        linear-gradient(140deg, #efe0cb 0%, #d8bea0 100%);
      font: 14px/1.5 "Segoe UI", "PingFang SC", sans-serif;
      color: #2f2721;
    }
    .panel {
      background: rgba(255, 251, 246, 0.96);
      border: 1px solid rgba(85, 63, 46, 0.12);
      border-radius: 24px;
      box-shadow: 0 18px 42px rgba(67, 42, 28, 0.12);
      padding: 18px;
    }
    .header { margin-bottom: 18px; }
    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #9a5638;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 22px;
      line-height: 1.15;
      margin-bottom: 6px;
    }
    .subtitle {
      color: #6e5e52;
      font-size: 12px;
    }
    .section { margin-bottom: 16px; }
    .section-title {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #6e5e52;
      margin-bottom: 8px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    input[type="text"] {
      width: 100%;
      padding: 11px 13px;
      border-radius: 12px;
      border: 1px solid rgba(85, 63, 46, 0.18);
      background: #fff;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: #b55d3d;
      box-shadow: 0 0 0 3px rgba(181, 93, 61, 0.12);
    }
    .badge {
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      display: inline-flex;
      gap: 6px;
      align-items: center;
      font-size: 12px;
      background: #f6e8df;
      color: #8c4428;
    }
    .badge.empty {
      background: #fff2dc;
      color: #9b6300;
    }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: #f8f1e8;
    }
    .toggle-label {
      font-size: 13px;
      color: #5f5147;
    }
    .switch { position: relative; width: 48px; height: 26px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: #d0c2b5;
      transition: .2s;
      cursor: pointer;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      left: 3px;
      top: 3px;
      border-radius: 50%;
      background: #fff;
      transition: .2s;
      box-shadow: 0 2px 6px rgba(0,0,0,.15);
    }
    .switch input:checked + .slider {
      background: linear-gradient(135deg, #b55d3d 0%, #87442a 100%);
    }
    .switch input:checked + .slider::before {
      transform: translateX(22px);
    }
    .target-grid {
      display: grid;
      gap: 8px;
    }
    .target {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 14px;
      background: #f8f1e8;
    }
    .target input { accent-color: #a74f30; }
    .target strong {
      display: block;
      font-size: 13px;
    }
    .target span {
      font-size: 12px;
      color: #6e5e52;
    }
    .status-box {
      padding: 12px 14px;
      border-radius: 16px;
      background: linear-gradient(180deg, #faf7f2 0%, #f3eadf 100%);
      border: 1px solid rgba(85, 63, 46, 0.08);
      text-align: center;
      font-weight: 600;
      color: #5b4a3d;
    }
    .progress-bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(85, 63, 46, 0.12);
      overflow: hidden;
    }
    .progress-fill {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #b55d3d 0%, #87442a 100%);
      transition: width .3s ease;
    }
    .progress-text {
      margin-top: 6px;
      text-align: center;
      color: #6e5e52;
      font-size: 12px;
    }
    .format-row {
      display: flex;
      gap: 8px;
    }
    .format-btn {
      flex: 1;
      padding: 10px 8px;
      border-radius: 14px;
      border: 1px solid rgba(85, 63, 46, 0.15);
      background: #fff;
      text-align: center;
      cursor: pointer;
      transition: .2s;
    }
    .format-btn.active {
      color: #fff;
      background: linear-gradient(135deg, #b55d3d 0%, #87442a 100%);
      border-color: transparent;
    }
    .format-btn .icon {
      display: block;
      font-size: 18px;
      margin-bottom: 4px;
    }
    .buttons {
      display: grid;
      gap: 10px;
    }
    button {
      border: none;
      border-radius: 14px;
      padding: 13px 14px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s;
    }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .primary {
      color: #fff;
      background: linear-gradient(135deg, #b55d3d 0%, #87442a 100%);
      box-shadow: 0 10px 24px rgba(135, 68, 42, 0.24);
    }
    .secondary {
      color: #87442a;
      background: #fff;
      border: 1px solid rgba(135, 68, 42, 0.18);
    }
    .danger {
      color: #8f2c22;
      background: #fff3ef;
      border: 1px solid rgba(143, 44, 34, 0.16);
    }
    .footer {
      margin-top: 14px;
      text-align: center;
      font-size: 11px;
      color: #7a6859;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="header">
      <div class="eyebrow">Douban Reading Archive</div>
      <h1>豆瓣阅读备份工具</h1>
      <p class="subtitle">把已读书籍、长书评、读书笔记一起备份下来。</p>
    </div>

    <div class="section">
      <label class="section-title" for="doubanId">豆瓣用户 ID</label>
      <input type="text" id="doubanId" placeholder="输入用户主页 ID，可留空自动识别">
      <div class="badge" id="currentUser">
        <span>...</span>
        <span>正在检测用户信息</span>
      </div>
    </div>

    <div class="section">
      <div class="toggle-row">
        <div class="toggle-label">访问已读页时自动抓取</div>
        <label class="switch">
          <input type="checkbox" id="autoCrawlEnabled">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="section">
      <label class="section-title">抓取内容</label>
      <div class="target-grid">
        <label class="target">
          <input type="checkbox" name="crawlTarget" value="interests">
          <div>
            <strong>已读书籍</strong>
            <span>书名、作者、出版信息、评分、短评</span>
          </div>
        </label>
        <label class="target">
          <input type="checkbox" name="crawlTarget" value="reviews">
          <div>
            <strong>长书评</strong>
            <span>书评标题、摘要、全文、评分。数据来自豆瓣 API，以接口实际返回为准。</span>
          </div>
        </label>
        <label class="target">
          <input type="checkbox" name="crawlTarget" value="annotations">
          <div>
            <strong>读书笔记</strong>
            <span>章节、页码、摘要、正文</span>
          </div>
        </label>
      </div>
    </div>

    <div class="section">
      <div class="status-box" id="status">就绪</div>
    </div>

    <div class="section">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">0%</div>
    </div>

    <div class="section">
      <label class="section-title">导出格式</label>
      <div class="format-row">
        <div class="format-btn active" data-format="csv">
          <span class="icon">CSV</span>
          <span>表格</span>
        </div>
        <div class="format-btn" data-format="html">
          <span class="icon">HTML</span>
          <span>阅读页</span>
        </div>
        <div class="format-btn" data-format="xlsx">
          <span class="icon">XLSX</span>
          <span>多工作表</span>
        </div>
      </div>
    </div>

    <div class="buttons">
      <button class="primary" id="crawlBtn">开始抓取</button>
      <button class="secondary" id="exportBtn">导出数据</button>
      <button class="secondary" id="browseBtn">浏览本地数据</button>
      <button class="danger" id="clearBtn">清空本地数据</button>
    </div>

    <div class="footer">v1.1 local build</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
