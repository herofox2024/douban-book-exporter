<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>本地阅读数据</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(242,192,131,.45), transparent 28%),
        linear-gradient(160deg, #efe4d4 0%, #d9c2a9 100%);
      color: #2f2721;
      font: 14px/1.6 "Segoe UI", "PingFang SC", sans-serif;
    }
    .shell { width: min(1120px, calc(100% - 32px)); margin: 28px auto 40px; }
    .hero, .panel, .card {
      background: rgba(255, 251, 246, 0.95);
      border: 1px solid rgba(85, 63, 46, 0.12);
      border-radius: 24px;
      box-shadow: 0 18px 42px rgba(67, 42, 28, 0.1);
    }
    .hero, .panel { padding: 22px 24px; }
    .hero { margin-bottom: 18px; }
    .eyebrow { color: #9a5638; font-size: 12px; text-transform: uppercase; letter-spacing: .18em; }
    h1 { margin: 8px 0 6px; font-size: 34px; }
    .subtle { color: #6e5e52; }
    .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-top: 18px; }
    .stat { background: #fff; border-radius: 16px; padding: 14px 16px; }
    .stat strong { display: block; font-size: 30px; color: #8c4428; line-height: 1.1; }
    .toolbar { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; margin-bottom: 18px; }
    .toolbar input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(85,63,46,.16);
      background: #fff;
      outline: none;
    }
    .toolbar input:focus { border-color: #b55d3d; box-shadow: 0 0 0 3px rgba(181,93,61,.12); }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .tab {
      border: 1px solid rgba(85,63,46,.14);
      background: #fff;
      color: #6b5d51;
      border-radius: 999px;
      padding: 9px 14px;
      cursor: pointer;
      font-weight: 700;
    }
    .tab.active {
      color: #fff;
      background: linear-gradient(135deg, #b55d3d 0%, #87442a 100%);
      border-color: transparent;
    }
    .list { display: grid; gap: 14px; }
    .card { padding: 18px; }
    .card h3 { margin: 0 0 8px; font-size: 20px; }
    .card a { color: #8c4428; text-decoration: none; }
    .card a:hover { text-decoration: underline; }
    .meta { color: #6e5e52; margin-bottom: 10px; }
    .pill { display: inline-block; margin: 0 8px 8px 0; background: #f6e8df; color: #7d5d4b; border-radius: 999px; padding: 4px 10px; font-size: 12px; }
    .body { white-space: pre-wrap; color: #3d322a; }
    .empty { text-align: center; color: #6e5e52; padding: 40px 20px; }
    .topbar { display: flex; gap: 10px; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .refresh {
      border: none; cursor: pointer; border-radius: 12px; padding: 10px 14px; font-weight: 700;
      color: #fff; background: linear-gradient(135deg, #b55d3d 0%, #87442a 100%);
    }
    @media (max-width: 720px) {
      .shell { width: min(100% - 20px, 1120px); margin-top: 16px; }
      .toolbar { grid-template-columns: 1fr; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="eyebrow">Local Explorer</div>
      <h1 id="pageTitle">本地阅读数据</h1>
      <div class="subtle" id="pageMeta">正在加载...</div>
      <div class="summary">
        <div class="stat"><strong id="countInterests">0</strong><span>已读书籍</span></div>
        <div class="stat"><strong id="countReviews">0</strong><span>长书评</span></div>
        <div class="stat"><strong id="countAnnotations">0</strong><span>读书笔记</span></div>
      </div>
    </section>

    <section class="panel">
      <div class="topbar">
        <div class="tabs">
          <button class="tab active" data-tab="interests">已读书籍</button>
          <button class="tab" data-tab="reviews">长书评</button>
          <button class="tab" data-tab="annotations">读书笔记</button>
        </div>
        <button class="refresh" id="refreshBtn">刷新</button>
      </div>
      <div class="toolbar">
        <input type="text" id="searchInput" placeholder="搜索标题、作者、正文关键词">
        <div class="subtle" id="resultMeta">0 条</div>
      </div>
      <div class="subtle" style="margin-bottom:12px;">长书评当前使用豆瓣 API 抓取，数据以接口实际返回为准。</div>
      <div class="list" id="list"></div>
    </section>
  </div>

  <script src="explorer.js"></script>
</body>
</html>
